name: Dependabot reviewer

on: pull_request

permissions:
  pull-requests: write
  contents: write

jobs:
  call-workflow-passing-data:
    uses: grafana/security-github-actions/.github/workflows/dependabot-automerge.yaml@796b732982506cdbe7c80de335bde851c42fbf55 # main
    with:
      repository-merge-method: squash
      #  Add this to define production packages that dependabot can auto-update if the bump is minor
      packages-minor-autoupdate: '[]'
    secrets: inherit
